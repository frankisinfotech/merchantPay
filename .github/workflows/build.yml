name: DockerImageBuild

on: push   
    
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout
      uses: actions/checkout@v2
    
    # - name: Build the Docker image
    #   #run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)      
    #   run: docker build --tag frankisinfotech/bulb:$GITHUB_RUN_NUMBER .
      
   
   
    - name: Login and push to dockerHUB
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
        # registry: frankisinfotech/bulb

    - name: Build Image
      run: |
          docker build -t frankisinfotech/bulb:$GITHUB_RUN_NUMBER .
          docker push frankisinfotech/bulb:$GITHUB_RUN_NUMBER
