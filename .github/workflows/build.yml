name: DockerImageBuild

on: push   
    
jobs:

  buildToDockerHub:

    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout
      uses: actions/checkout@v2
   
    - name: Login to dockerHUB
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build Image
      run: |
          docker build -t frankisinfotech/bulb:$GITHUB_RUN_NUMBER .
          docker push frankisinfotech/bulb:$GITHUB_RUN_NUMBER

  buildToAWSPrivateECR:
    needs: buildToDockerHub
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout
      uses: actions/checkout@v2

    - name: Login to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.REGION }}
          
    - name: Login to Private ECR
      uses: docker/login-action@v3
      with:
          registry: 798470206542.dkr.ecr.eu-west-1.amazonaws.com
          username: ${{ secrets.ACCESS_KEY }}
          password: ${{ secrets.SECRET_ACCESS_KEY }}
      env:
          aws-region: ${{ secrets.REGION }}

    - name: Build Image
      run: |
          docker build -t mpay .
          docker tag mpay:latest 798470206542.dkr.ecr.eu-west-1.amazonaws.com/mpay:$GITHUB_RUN_NUMBER
          docker push 798470206542.dkr.ecr.eu-west-1.amazonaws.com/mpay:$GITHUB_RUN_NUMBER


  buildToAWSPublicECR:
    needs: buildToAWSPrivateECR
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout
      uses: actions/checkout@v2
          
    - name: Login to Public ECR
      uses: docker/login-action@v3
      with:
          registry: public.ecr.aws
          username: ${{ secrets.ACCESS_KEY }}
          password: ${{ secrets.SECRET_ACCESS_KEY }}
      env:
          aws-region: ${{ secrets.REGION }}

    - name: Build Image
      run: |
          docker build -t mpay .
          docker tag mpay:latest public.ecr.aws/w8u1h7n9/mpay-pub:$GITHUB_RUN_NUMBER
          docker push public.ecr.aws/w8u1h7n9/mpay-pub:$GITHUB_RUN_NUMBER
